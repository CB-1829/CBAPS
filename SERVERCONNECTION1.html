<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Google Master Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        #messages-container { scroll-behavior: smooth; }
        .msg-me { background-color: #4f46e5; color: white; border-bottom-right-radius: 0; }
        .msg-them { background-color: white; color: #1e293b; border-bottom-left-radius: 0; border: 1px solid #e2e8f0; }
        .key-input { letter-spacing: 0.5em; text-align: center; font-family: monospace; }
        .loader { border-top-color: #4f46e5; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-950 h-screen flex flex-col font-sans text-slate-200 overflow-hidden">

    <!-- LOADING OVERLAY -->
    <div id="loading-layer" class="fixed inset-0 z-[200] bg-slate-950 flex flex-col items-center justify-center">
        <div class="loader w-12 h-12 border-4 border-slate-800 rounded-full mb-4"></div>
        <p class="text-slate-500 text-sm font-medium tracking-widest uppercase">Securing Connection</p>
    </div>

    <!-- LAYER 1: AUTHENTICATION -->
    <div id="auth-layer" class="hidden fixed inset-0 z-[150] bg-slate-950 flex items-center justify-center p-4">
        <div class="max-w-md w-full text-center space-y-8">
            <div class="bg-indigo-600 w-20 h-20 rounded-3xl mx-auto flex items-center justify-center text-white text-3xl shadow-2xl shadow-indigo-500/20 rotate-3">
                <i class="fab fa-google"></i>
            </div>
            <div class="space-y-2">
                <h1 class="text-3xl font-black text-white tracking-tight">Identity Required</h1>
                <p class="text-slate-500">Sign in with Google to verify ownership status.</p>
            </div>
            <button id="google-login-btn" class="w-full bg-white text-black font-bold py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-slate-100 transition-all active:scale-95 shadow-xl">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                Continue with Google
            </button>
        </div>
    </div>

    <!-- LAYER 2: FIRST-TIME SETUP -->
    <div id="setup-layer" class="hidden fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-slate-800 rounded-3xl shadow-2xl p-8 border border-slate-700">
            <h2 class="text-2xl font-black text-white mb-2">Vault Initialization</h2>
            <p class="text-slate-400 text-sm mb-6">You are the first user. Your Google account will be permanently linked as the Master.</p>
            <form id="init-form" class="space-y-6">
                <div class="p-4 bg-slate-900 rounded-xl border border-slate-700 flex items-center gap-3">
                    <img id="setup-avatar" class="w-10 h-10 rounded-full bg-slate-800">
                    <div>
                        <p id="setup-name" class="text-sm font-bold text-white"></p>
                        <p id="setup-email" class="text-xs text-slate-500"></p>
                    </div>
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Generate 3 Physical Keys</label>
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" placeholder="CODE PART 1" id="k1" class="bg-slate-900 border border-slate-700 p-4 rounded-xl text-center font-mono focus:border-indigo-500 outline-none" required>
                        <input type="text" placeholder="CODE PART 2" id="k2" class="bg-slate-900 border border-slate-700 p-4 rounded-xl text-center font-mono focus:border-indigo-500 outline-none" required>
                        <input type="text" placeholder="CODE PART 3" id="k3" class="bg-slate-900 border border-slate-700 p-4 rounded-xl text-center font-mono focus:border-indigo-500 outline-none" required>
                    </div>
                </div>
                <button type="submit" class="w-full bg-indigo-600 p-4 rounded-xl font-bold hover:bg-indigo-500 transition-all shadow-lg shadow-indigo-500/20">Seal & Lock Vault</button>
            </form>
        </div>
    </div>

    <!-- LAYER 3: LOCKED SCREEN -->
    <div id="lock-layer" class="hidden fixed inset-0 z-[90] bg-slate-950 flex items-center justify-center p-4">
        <div class="text-center space-y-6 max-w-sm w-full">
            <div class="relative">
                <img id="lock-avatar" class="w-20 h-20 rounded-full border-4 border-slate-800 mx-auto mb-4">
                <div class="absolute bottom-4 right-[calc(50%-40px)] w-8 h-8 bg-red-500 rounded-full flex items-center justify-center border-4 border-slate-950 text-[10px]">
                    <i class="fas fa-lock"></i>
                </div>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-white">Hello, <span id="lock-user-name"></span></h1>
                <p class="text-slate-500 text-sm">Owner identity confirmed. Enter keys to decrypt.</p>
            </div>
            <div class="space-y-3">
                <input type="password" id="unlock-k1" placeholder="Part A" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl key-input outline-none focus:border-indigo-500">
                <input type="password" id="unlock-k2" placeholder="Part B" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl key-input outline-none focus:border-indigo-500">
                <input type="password" id="unlock-k3" placeholder="Part C" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl key-input outline-none focus:border-indigo-500">
            </div>
            <button id="unlock-btn" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl hover:bg-indigo-500 transition-all shadow-xl shadow-indigo-500/10">Unlock Server</button>
            <p id="lock-status" class="text-xs text-red-400 font-medium h-4"></p>
            <button onclick="location.reload()" class="text-slate-600 text-xs hover:text-slate-400">Switch Account</button>
        </div>
    </div>

    <!-- LAYER 4: MAIN APP -->
    <div id="chat-app" class="hidden flex flex-col h-screen max-w-5xl mx-auto w-full bg-white shadow-2xl overflow-hidden text-slate-900">
        <header class="bg-white border-b border-slate-100 px-8 py-6 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img id="app-avatar" class="w-10 h-10 rounded-xl shadow-md">
                <div>
                    <h2 class="font-black text-slate-900 text-lg tracking-tight">Master Hub</h2>
                    <p id="owner-tag" class="text-[10px] text-green-500 uppercase font-bold tracking-widest">Admin Secured</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button id="logout-btn" class="text-slate-300 hover:text-red-500 transition-all"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <main id="messages-container" class="flex-1 overflow-y-auto p-8 space-y-6 bg-slate-50/50 scrollbar-thin"></main>

        <footer class="p-6 bg-white border-t border-slate-100">
            <form id="chat-form" action="javascript:void(0);" class="flex gap-3">
                <input type="text" id="message-input" placeholder="Broadcast to apps..." class="flex-1 bg-slate-100 border-none rounded-2xl px-6 py-4 text-sm outline-none">
                <button type="submit" class="bg-indigo-600 text-white w-14 h-14 rounded-2xl shadow-lg hover:bg-indigo-700 flex items-center justify-center text-xl">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, onSnapshot, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth, currentUser, vaultConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'google-secure-hub';
        
        // --- HELPERS ---
        const getVaultDoc = (col, docId) => doc(db, 'artifacts', appId, 'public', 'data', col, docId);
        const getMessagesCol = () => collection(db, 'artifacts', appId, 'public', 'data', 'messages');

        const showLayer = (id) => {
            ['loading-layer', 'auth-layer', 'setup-layer', 'lock-layer', 'chat-app'].forEach(l => {
                document.getElementById(l).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        };

        // --- 1. STARTUP ---
        async function start() {
            const firebaseConfig = JSON.parse(__firebase_config);
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    await checkVaultStatus();
                } else {
                    showLayer('auth-layer');
                }
            });
        }

        // --- 2. GOOGLE LOGIN ---
        document.getElementById('google-login-btn').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                alert("Auth Error: " + e.message);
            }
        };

        // --- 3. CHECK OWNERSHIP ---
        async function checkVaultStatus() {
            try {
                const metaRef = getVaultDoc('config', 'vault_metadata');
                const metaSnap = await getDoc(metaRef);

                if (!metaSnap.exists()) {
                    // No owner yet - First person to login wins
                    document.getElementById('setup-avatar').src = currentUser.photoURL;
                    document.getElementById('setup-name').textContent = currentUser.displayName;
                    document.getElementById('setup-email').textContent = currentUser.email;
                    showLayer('setup-layer');
                } else {
                    vaultConfig = metaSnap.data();
                    // Check if current user is the owner
                    if (vaultConfig.ownerUid !== currentUser.uid) {
                        alert("Access Denied: You are not the registered Master of this Hub.");
                        await signOut(auth);
                        return;
                    }
                    
                    document.getElementById('lock-avatar').src = currentUser.photoURL;
                    document.getElementById('lock-user-name').textContent = currentUser.displayName.split(' ')[0];
                    showLayer('lock-layer');
                }
            } catch (e) {
                console.error(e);
            }
        }

        // --- 4. INITIAL SETUP ---
        document.getElementById('init-form').onsubmit = async (e) => {
            e.preventDefault();
            const keys = [
                document.getElementById('k1').value.trim(),
                document.getElementById('k2').value.trim(),
                document.getElementById('k3').value.trim()
            ];

            try {
                // Save Owner Data
                const metaRef = getVaultDoc('config', 'vault_metadata');
                await setDoc(metaRef, { 
                    ownerEmail: currentUser.email, 
                    ownerUid: currentUser.uid,
                    ownerName: currentUser.displayName,
                    ownerPhoto: currentUser.photoURL,
                    initialized: true 
                });

                // Create the "Key Files" - the filename IS the code
                for (let i = 0; i < 3; i++) {
                    const keyRef = getVaultDoc('keys', `key_part_${keys[i]}`);
                    await setDoc(keyRef, { valid: true, part: i, timestamp: serverTimestamp() });
                }

                alert("Vault Sealed. Your Google account is now the permanent Master.");
                location.reload();
            } catch (err) {
                alert("Setup Failed: " + err.message);
            }
        };

        // --- 5. DECRYPTION (VERIFY 3 FILES) ---
        document.getElementById('unlock-btn').onclick = async () => {
            const k1 = document.getElementById('unlock-k1').value;
            const k2 = document.getElementById('unlock-k2').value;
            const k3 = document.getElementById('unlock-k3').value;
            const status = document.getElementById('lock-status');
            
            status.textContent = "Validating cryptographic parts...";

            try {
                // Use the input strings to try and fetch docs that only exist if codes are correct
                const results = await Promise.all([
                    getDoc(getVaultDoc('keys', `key_part_${k1}`)),
                    getDoc(getVaultDoc('keys', `key_part_${k2}`)),
                    getDoc(getVaultDoc('keys', `key_part_${k3}`))
                ]);

                if (results.every(snap => snap.exists())) {
                    launchApp();
                } else {
                    status.textContent = "INVALID KEY SEQUENCE";
                }
            } catch (e) {
                status.textContent = "Communication error.";
            }
        };

        // --- 6. MAIN APP ---
        function launchApp() {
            showLayer('chat-app');
            document.getElementById('app-avatar').src = currentUser.photoURL;
            
            const q = getMessagesCol();
            onSnapshot(q, (snap) => {
                const msgs = [];
                snap.forEach(d => msgs.push(d.data()));
                msgs.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                render(msgs);
            });
        }

        function render(msgs) {
            const container = document.getElementById('messages-container');
            container.innerHTML = msgs.length === 0 ? '<div class="text-center py-20 text-slate-300 italic">No broadcasts found.</div>' : '';
            msgs.forEach(msg => {
                const isMe = msg.uid === currentUser.uid;
                const div = document.createElement('div');
                div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
                div.innerHTML = `
                    <span class="text-[10px] font-bold text-slate-400 mb-1 uppercase">${msg.user}</span>
                    <div class="px-6 py-3 rounded-2xl text-sm ${isMe ? 'msg-me shadow-lg shadow-indigo-500/10' : 'msg-them'}">${msg.text}</div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            await addDoc(getMessagesCol(), {
                text, user: currentUser.displayName, uid: currentUser.uid, createdAt: serverTimestamp()
            });
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());

        start();
    </script>
</body>
</html>
