<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge-OS | Logic Shell</title>
    <!-- Stable Tailwind CSS via standard Link tag -->
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.5);
            --border-color: #1e293b;
            --accent-color: #4f46e5;
            --input-bg: #0f172a; 
        }

        body {
            background-color: var(--bg-color);
            color: #cbd5e1;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .grid-bg { 
            background-image: radial-gradient(#1e293b 1px, transparent 1px); 
            background-size: 30px 30px; 
        }
        
        .file-slot {
            border: 2px dashed var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .file-slot.loaded { 
            border: 2px solid #22c55e;
            background-color: rgba(34, 197, 94, 0.05);
        }
        
        .status-pulse { 
            animation: pulse 2s infinite; 
        }

        @keyframes pulse { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.4; } 
        }

        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
        
        .config-textarea {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--border-color);
        }
        .config-textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }

        /* Custom Modal for alerts since browser alerts are disabled */
        #custom-alert {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 500;
            background: #22c55e;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="custom-alert" class="mono text-xs uppercase tracking-widest"></div>

    <!-- SETUP LAYER -->
    <div id="setup-layer" class="fixed inset-0 z-[300] bg-slate-950 flex items-center justify-center p-4">
        <div class="max-w-md w-full text-center">
            <div class="bg-indigo-600 w-16 h-16 rounded-2xl mx-auto flex items-center justify-center text-white text-2xl shadow-2xl mb-8">
                <i class="fas fa-plug"></i>
            </div>
            <div class="space-y-2 mb-8">
                <h1 class="text-2xl font-black text-white tracking-tight italic">BRIDGE-INIT</h1>
                <p class="text-slate-500 uppercase text-[9px] font-bold tracking-[0.2em]">Awaiting external Firebase Configuration</p>
            </div>
            <textarea id="config-input" placeholder="Paste your Firebase JSON config here..." class="config-textarea w-full h-32 rounded-xl p-4 text-[10px] mono text-indigo-400 outline-none transition-all mb-4"></textarea>
            <button id="init-system-btn" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-slate-200 transition-all text-xs tracking-widest uppercase">Load Core Engine</button>
        </div>
    </div>

    <!-- LOCK LAYER -->
    <div id="lock-layer" class="hidden fixed inset-0 z-[200] bg-slate-950 flex flex-col items-center justify-center p-4">
        <div class="max-w-2xl w-full text-center space-y-8">
            <div class="space-y-2">
                <h2 class="text-2xl font-black text-white uppercase tracking-tighter">Physical Key Auth</h2>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Insert 3 Keyfiles to Decrypt Node</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <label for="key-1" id="slot-1" class="file-slot p-8 rounded-2xl flex flex-col items-center space-y-4">
                    <input type="file" id="key-1" class="hidden">
                    <i class="fas fa-file-code text-2xl text-slate-600 icon"></i>
                    <span class="text-[9px] font-bold uppercase tracking-widest text-slate-400 name">ALPHA.key</span>
                </label>
                <label for="key-2" id="slot-2" class="file-slot p-8 rounded-2xl flex flex-col items-center space-y-4">
                    <input type="file" id="key-2" class="hidden">
                    <i class="fas fa-file-contract text-2xl text-slate-600 icon"></i>
                    <span class="text-[9px] font-bold uppercase tracking-widest text-slate-400 name">BETA.sig</span>
                </label>
                <label for="key-3" id="slot-3" class="file-slot p-8 rounded-2xl flex flex-col items-center space-y-4">
                    <input type="file" id="key-3" class="hidden">
                    <i class="fas fa-file-export text-2xl text-slate-600 icon"></i>
                    <span class="text-[9px] font-bold uppercase tracking-widest text-slate-400 name">GAMMA.vault</span>
                </label>
            </div>

            <button id="decrypt-btn" disabled class="px-12 py-4 bg-slate-800 text-slate-500 font-black rounded-xl transition-all uppercase text-xs tracking-widest cursor-not-allowed">
                Keys Missing
            </button>
        </div>
    </div>

    <!-- HUB INTERFACE -->
    <div id="hub-app" class="hidden flex h-screen bg-slate-950">
        <aside class="w-64 border-r border-slate-800 flex flex-col bg-slate-900 bg-opacity-50">
            <div class="p-6">
                <div class="flex items-center space-x-3 mb-8">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white"><i class="fas fa-microchip"></i></div>
                    <h1 class="font-black text-white tracking-tighter text-xl italic">BRIDGE-V4</h1>
                </div>
                <div class="space-y-4">
                    <div class="bg-indigo-500 bg-opacity-10 border border-indigo-500 border-opacity-20 p-4 rounded-xl">
                        <span class="text-[8px] font-black text-indigo-400 uppercase block mb-1">System Status</span>
                        <div class="flex items-center space-x-2">
                            <div class="w-1.5 h-1.5 rounded-full bg-green-500 status-pulse"></div>
                            <span class="text-[10px] text-white mono uppercase">Live_Sync</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-auto p-6">
                <button onclick="location.reload()" class="text-[10px] font-black text-slate-600 hover:text-red-400 uppercase tracking-widest transition-all">Emergency Wipe</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col grid-bg">
            <header class="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-slate-950 bg-opacity-80">
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Event Relay Monitor</span>
                <div id="project-tag" class="text-xs font-bold text-indigo-400 mono text-right">
                    <span class="block text-[8px] opacity-50 uppercase tracking-widest">Target Path</span>
                    my_first_collection
                </div>
            </header>
            <div id="messages-container" class="flex-1 overflow-y-auto p-8 space-y-4 scrollbar-thin">
                <div class="flex items-center justify-center h-full">
                    <p class="text-slate-600 mono text-[10px] uppercase tracking-widest animate-pulse">Awaiting Decryption...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        // Fixed Version (11.6.1) to ensure the script actually works
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db;
        let keysLoaded = { 1: false, 2: false, 3: false };

        function showMessage(text, isError = false) {
            const el = document.getElementById('custom-alert');
            el.textContent = text;
            el.style.backgroundColor = isError ? '#ef4444' : '#22c55e';
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        // INTEGRATED FORCE SCRIPT
        async function saveData(databaseInstance) {
            try {
                // As per user script: create folder 'Users' and put name inside
                await addDoc(collection(databaseInstance, "Users"), {
                    name: "Test User",
                    message: "It finally works!"
                });
                showMessage("Success: Check your Firebase screen now!");
            } catch (e) {
                showMessage("Error: " + e.message, true);
            }
        }

        document.getElementById('init-system-btn').onclick = async () => {
            const configText = document.getElementById('config-input').value;
            try {
                const config = JSON.parse(configText);
                const app = initializeApp(config);
                db = getFirestore(app);
                
                // Trigger your force script immediately
                await saveData(db);

                document.getElementById('setup-layer').classList.add('hidden');
                document.getElementById('lock-layer').classList.remove('hidden');
            } catch (e) {
                showMessage("Invalid Firebase Configuration JSON.", true);
            }
        };

        [1, 2, 3].forEach(num => {
            document.getElementById(`key-${num}`).onchange = (e) => {
                if (e.target.files.length > 0) {
                    keysLoaded[num] = true;
                    const slot = document.getElementById(`slot-${num}`);
                    slot.classList.add('loaded');
                    slot.querySelector('.icon').className = 'fas fa-check-circle text-2xl text-green-500';
                    checkKeys();
                }
            };
        });

        function checkKeys() {
            if (keysLoaded[1] && keysLoaded[2] && keysLoaded[3]) {
                const btn = document.getElementById('decrypt-btn');
                btn.disabled = false;
                btn.style.backgroundColor = '#4f46e5';
                btn.style.color = '#ffffff';
                btn.style.cursor = 'pointer';
                btn.textContent = "Decrypt System";
            }
        }

        document.getElementById('decrypt-btn').onclick = () => {
            document.getElementById('lock-layer').classList.add('hidden');
            document.getElementById('hub-app').classList.remove('hidden');
            startMonitor();
        };

        function startMonitor() {
            const targetCollection = "my_first_collection";
            const container = document.getElementById('messages-container');
            
            onSnapshot(collection(db, targetCollection), (snap) => {
                container.innerHTML = '';
                if (snap.empty) {
                    container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-700 mono text-xs uppercase italic">No Data in "${targetCollection}"</div>`;
                    return;
                }

                snap.forEach(doc => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = "bg-slate-900 bg-opacity-50 p-6 rounded-xl border border-slate-800 mono text-[11px] shadow-2xl transition-all hover:border-indigo-500 hover:bg-opacity-80";
                    
                    const statusColor = data.status === 'Success!' ? '#22c55e' : '#6366f1';
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-center border-b border-slate-800 pb-3 mb-4">
                            <div class="flex flex-col">
                                <span class="text-[8px] opacity-40 uppercase tracking-widest">Document ID</span>
                                <span class="text-slate-400">${doc.id}</span>
                            </div>
                            <div class="text-right">
                                <span class="text-[8px] opacity-40 uppercase tracking-widest block">Status</span>
                                <span style="color: ${statusColor}" class="font-bold">${data.status || 'STABLE'}</span>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <span class="text-[8px] opacity-40 uppercase tracking-widest block mb-1">Relay Content</span>
                                <div class="bg-black bg-opacity-30 p-3 rounded border border-slate-800 border-opacity-50 text-indigo-100 italic leading-relaxed">
                                    "${data.message || 'EMPTY_PACKET'}"
                                </div>
                            </div>
                            <div class="flex justify-between items-end opacity-40 pt-2 text-[9px]">
                                <span class="uppercase tracking-tighter">System Timestamp</span>
                                <span>${data.timestamp || 'N/A'}</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }, (error) => {
                container.innerHTML = `<div class="p-6 bg-red-900/20 text-red-400 mono text-[10px] border border-red-500/50 rounded-xl">ERROR: ${error.message}</div>`;
            });
        }
    </script>
</body>
</html>
