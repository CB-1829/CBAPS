<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge-OS | Logic Shell</title>
    <!-- Use Tailwind Play CDN for development/demo portability -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // Optional configuration to suppress standard console warnings 
        // and define the theme to match Bridge-OS aesthetics
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer components {
            .grid-bg { 
                background-image: radial-gradient(#1e293b 1px, transparent 1px); 
                background-size: 30px 30px; 
            }
            
            .file-slot {
                @apply border-2 border-dashed border-slate-800 transition-all duration-300 cursor-pointer;
            }
            .file-slot.active { 
                @apply border-indigo-600 bg-indigo-600/5;
            }
            .file-slot.loaded { 
                @apply border-solid border-green-500 bg-green-500/5;
            }
            
            .status-pulse { 
                animation: pulse 2s infinite; 
            }
        }

        @keyframes pulse { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.4; } 
        }

        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 h-screen overflow-hidden flex flex-col font-sans">

    <!-- STEP 1: DYNAMIC CONFIG LOADING -->
    <div id="setup-layer" class="fixed inset-0 z-[300] bg-slate-950 flex items-center justify-center p-4">
        <div class="max-w-md w-full text-center space-y-8">
            <div class="bg-indigo-600 w-16 h-16 rounded-2xl mx-auto flex items-center justify-center text-white text-2xl shadow-2xl">
                <i class="fas fa-plug"></i>
            </div>
            <div class="space-y-2">
                <h1 class="text-2xl font-black text-white tracking-tight italic">BRIDGE-INIT</h1>
                <p class="text-slate-500 uppercase text-[9px] font-bold tracking-[0.2em]">Awaiting external Firebase Configuration</p>
            </div>
            <textarea id="config-input" placeholder="Paste your Firebase JSON config here..." class="w-full h-32 bg-slate-900 border border-slate-800 rounded-xl p-4 text-[10px] font-mono text-indigo-400 outline-none focus:border-indigo-500 transition-all"></textarea>
            <button id="init-system-btn" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-slate-200 transition-all text-xs tracking-widest">LOAD CORE ENGINE</button>
        </div>
    </div>

    <!-- STEP 2: TRIPLE FILE-KEY VAULT (HIDDEN UNTIL INIT) -->
    <div id="lock-layer" class="hidden fixed inset-0 z-[200] bg-slate-950 flex flex-col items-center justify-center p-4">
        <div class="max-w-2xl w-full text-center space-y-8">
            <div class="space-y-2">
                <h2 class="text-2xl font-black text-white uppercase tracking-tighter">Physical Key Auth</h2>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Insert 3 Keyfiles to Decrypt Node</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <label for="key-1" id="slot-1" class="file-slot p-8 rounded-2xl flex flex-col items-center gap-4">
                    <input type="file" id="key-1" class="hidden">
                    <i class="fas fa-file-code text-2xl text-slate-600 icon"></i>
                    <span class="text-[9px] font-bold uppercase tracking-widest text-slate-400 name">ALPHA.key</span>
                </label>
                <label for="key-2" id="slot-2" class="file-slot p-8 rounded-2xl flex flex-col items-center gap-4">
                    <input type="file" id="key-2" class="hidden">
                    <i class="fas fa-file-contract text-2xl text-slate-600 icon"></i>
                    <span class="text-[9px] font-bold uppercase tracking-widest text-slate-400 name">BETA.sig</span>
                </label>
                <label for="key-3" id="slot-3" class="file-slot p-8 rounded-2xl flex flex-col items-center gap-4">
                    <input type="file" id="key-3" class="hidden">
                    <i class="fas fa-file-export text-2xl text-slate-600 icon"></i>
                    <span class="text-[9px] font-bold uppercase tracking-widest text-slate-400 name">GAMMA.vault</span>
                </label>
            </div>

            <button id="decrypt-btn" disabled class="px-12 py-4 bg-slate-800 text-slate-500 font-black rounded-xl transition-all uppercase text-xs tracking-widest cursor-not-allowed">
                Keys Missing
            </button>
        </div>
    </div>

    <!-- THE FINAL HUB INTERFACE -->
    <div id="hub-app" class="hidden flex h-screen bg-slate-950">
        <aside class="w-64 border-r border-slate-800 flex flex-col bg-slate-900/50 backdrop-blur-xl">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white"><i class="fas fa-microchip"></i></div>
                    <h1 class="font-black text-white tracking-tighter text-xl">BRIDGE-V4</h1>
                </div>
                <div class="space-y-4">
                    <div class="bg-indigo-500/10 border border-indigo-500/20 p-4 rounded-xl">
                        <span class="text-[8px] font-black text-indigo-400 uppercase block mb-1">System Status</span>
                        <div class="flex items-center gap-2">
                            <div class="w-1.5 h-1.5 rounded-full bg-green-500 status-pulse"></div>
                            <span class="text-[10px] text-white font-mono">LIVE_SYNC_ON</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-auto p-6">
                <button onclick="location.reload()" class="text-[10px] font-black text-slate-600 hover:text-red-400 uppercase tracking-widest transition-all">Emergency Wipe</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col grid-bg">
            <header class="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-slate-950/80 backdrop-blur-md">
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Event Relay Monitor</span>
                <div id="project-tag" class="text-xs font-bold text-indigo-400 font-mono">AWAITING_RELAY</div>
            </header>
            <div id="messages-container" class="flex-1 overflow-y-auto p-8 space-y-4 scrollbar-thin">
                <!-- Data packets will render here -->
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db;
        let keysLoaded = { 1: false, 2: false, 3: false };

        // 1. DYNAMIC INITIALIZATION
        document.getElementById('init-system-btn').onclick = () => {
            const configText = document.getElementById('config-input').value;
            try {
                const config = JSON.parse(configText);
                const app = initializeApp(config);
                db = getFirestore(app);
                
                document.getElementById('project-tag').textContent = config.projectId;
                document.getElementById('setup-layer').classList.add('hidden');
                document.getElementById('lock-layer').classList.remove('hidden');
            } catch (e) {
                alert("Invalid Firebase Configuration JSON");
            }
        };

        // 2. KEY LOADING LOGIC
        [1, 2, 3].forEach(num => {
            document.getElementById(`key-${num}`).onchange = (e) => {
                if (e.target.files.length > 0) {
                    keysLoaded[num] = true;
                    const slot = document.getElementById(`slot-${num}`);
                    slot.classList.add('loaded');
                    slot.querySelector('.icon').className = 'fas fa-check-circle text-2xl text-green-500';
                    checkKeys();
                }
            };
        });

        function checkKeys() {
            if (keysLoaded[1] && keysLoaded[2] && keysLoaded[3]) {
                const btn = document.getElementById('decrypt-btn');
                btn.disabled = false;
                btn.className = "px-12 py-4 bg-indigo-600 text-white font-black rounded-xl transition-all uppercase text-xs tracking-widest hover:bg-indigo-500 cursor-pointer";
                btn.textContent = "Decrypt System";
            }
        }

        document.getElementById('decrypt-btn').onclick = () => {
            document.getElementById('lock-layer').classList.add('hidden');
            document.getElementById('hub-app').classList.remove('hidden');
            startMonitor();
        };

        function startMonitor() {
            onSnapshot(collection(db, "Users"), (snap) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = "bg-slate-900/50 p-4 rounded-xl border border-slate-800 font-mono text-xs";
                    card.innerHTML = `
                        <div class="flex justify-between border-b border-slate-800 pb-2 mb-2 opacity-50">
                            <span>ID: ${doc.id}</span>
                            <span>SOURCE: ${data.name || 'UNKNOWN'}</span>
                        </div>
                        <div class="text-indigo-400">${data.message || 'NO_DATA'}</div>
                    `;
                    container.appendChild(card);
                });
            });
        }
    </script>
</body>
</html>
