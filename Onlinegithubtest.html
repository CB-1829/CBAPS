<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Community Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        #messages-container { scroll-behavior: smooth; }
        .msg-me { background-color: #4f46e5; color: white; border-bottom-right-radius: 0; }
        .msg-them { background-color: white; color: #1e293b; border-bottom-left-radius: 0; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans">

    <!-- JOIN SCREEN -->
    <div id="join-screen" class="fixed inset-0 z-50 bg-slate-50 flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-200 text-center">
            <div class="bg-indigo-600 w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center text-white text-2xl shadow-lg">
                <i class="fas fa-comments"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">GitHub Chat</h1>
            <p class="text-slate-500 mt-2 mb-8">Enter a name to join the live conversation.</p>
            
            <form id="join-form" action="javascript:void(0);" class="space-y-4">
                <input
                    type="text"
                    id="username-input"
                    placeholder="Enter nickname..."
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-slate-800"
                    maxlength="20"
                    required
                />
                <button
                    type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl shadow-md transition-all active:scale-95"
                >
                    Join Chat
                </button>
            </form>
        </div>
    </div>

    <!-- CHAT APP -->
    <div id="chat-app" class="hidden flex flex-col h-screen max-w-4xl mx-auto w-full shadow-2xl overflow-hidden bg-slate-100">
        <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600">
                    <i class="fas fa-hashtag"></i>
                </div>
                <h2 class="font-bold text-slate-800">Global Chat</h2>
            </div>
            <button id="logout-btn" class="text-slate-400 hover:text-red-500 transition-colors">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </header>

        <main id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-white/50 scrollbar-thin">
            <div id="empty-state" class="flex flex-col items-center justify-center h-full text-slate-400 opacity-50">
                <i class="far fa-comment-dots text-4xl mb-2"></i>
                <p>Connecting to backend...</p>
            </div>
        </main>

        <footer class="p-4 bg-white border-t border-slate-200 shrink-0">
            <form id="chat-form" action="javascript:void(0);" class="flex gap-2">
                <input
                    type="text"
                    id="message-input"
                    placeholder="Type a message..."
                    class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                    autocomplete="off"
                />
                <button type="submit" class="bg-indigo-600 text-white p-3 rounded-xl shadow-md hover:bg-indigo-700">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- CONFIGURATION ---
        // On GitHub Pages, you need to replace this with your actual Firebase config object
        // from the Firebase Console (Settings > Project Settings).
        let firebaseConfig;
        try {
            firebaseConfig = JSON.parse(__firebase_config);
        } catch (e) {
            // FALLBACK: Replace the {} below with your Firebase Config if running on your own domain
            firebaseConfig = {
                apiKey: "YOUR_API_KEY",
                authDomain: "YOUR_PROJECT.firebaseapp.com",
                projectId: "YOUR_PROJECT_ID",
                storageBucket: "YOUR_PROJECT.appspot.com",
                messagingSenderId: "YOUR_ID",
                appId: "YOUR_APP_ID"
            };
        }

        const appIdentifier = typeof __app_id !== 'undefined' ? __app_id : 'github-live-chat';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let displayName = localStorage.getItem('chat_username') || '';

        const elements = {
            join: document.getElementById('join-screen'),
            chat: document.getElementById('chat-app'),
            joinForm: document.getElementById('join-form'),
            chatForm: document.getElementById('chat-form'),
            userInput: document.getElementById('username-input'),
            msgInput: document.getElementById('message-input'),
            container: document.getElementById('messages-container'),
            empty: document.getElementById('empty-state'),
            logout: document.getElementById('logout-btn')
        };

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { console.error("Auth error:", err); }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user && displayName) showChat();
        });

        function showChat() {
            elements.join.classList.add('hidden');
            elements.chat.classList.remove('hidden');
            startListening();
        }

        let unsubscribe = null;
        function startListening() {
            if (unsubscribe) unsubscribe();
            // This path ensures your messages are saved correctly in the shared cloud DB
            const q = query(collection(db, 'artifacts', appIdentifier, 'public', 'data', 'messages'));
            unsubscribe = onSnapshot(q, (snap) => {
                const msgs = snap.docs.map(d => ({id: d.id, ...d.data()}))
                    .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                render(msgs);
            }, (err) => {
                console.error("Firestore error. Ensure your Security Rules allow access to the artifacts path.");
            });
        }

        function render(msgs) {
            elements.container.innerHTML = '';
            if (msgs.length === 0) {
                elements.container.appendChild(elements.empty);
                elements.empty.innerHTML = `<p>No messages yet. Start the chat!</p>`;
                return;
            }
            msgs.forEach(msg => {
                const isMe = msg.userId === currentUser.uid;
                const div = document.createElement('div');
                div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
                div.innerHTML = `
                    ${!isMe ? `<span class="text-[10px] font-bold text-slate-400 ml-1 mb-1">${msg.sender}</span>` : ''}
                    <div class="px-4 py-2 rounded-2xl text-sm ${isMe ? 'msg-me' : 'msg-them'}">${escape(msg.text)}</div>
                `;
                elements.container.appendChild(div);
            });
            elements.container.scrollTop = elements.container.scrollHeight;
        }

        function escape(s) { const t = document.createElement('p'); t.textContent = s || ""; return t.innerHTML; }

        elements.joinForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = elements.userInput.value.trim();
            if (name) {
                displayName = name;
                localStorage.setItem('chat_username', name);
                if (currentUser) showChat(); else initAuth();
            }
        });

        elements.chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = elements.msgInput.value.trim();
            if (!text || !currentUser) return;
            elements.msgInput.value = '';
            await addDoc(collection(db, 'artifacts', appIdentifier, 'public', 'data', 'messages'), {
                text, sender: displayName, userId: currentUser.uid, createdAt: serverTimestamp()
            });
        });

        elements.logout.onclick = () => {
            localStorage.removeItem('chat_username');
            location.reload();
        };

        initAuth();
    </script>
</body>
</html>
