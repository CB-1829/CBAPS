<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        
        #messages-container {
            scroll-behavior: smooth;
        }

        /* Message bubble styles */
        .msg-me {
            background-color: #4f46e5;
            color: white;
            border-bottom-right-radius: 0;
        }
        .msg-them {
            background-color: white;
            color: #1e293b;
            border-bottom-left-radius: 0;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans">

    <!-- JOIN SCREEN -->
    <div id="join-screen" class="fixed inset-0 z-50 bg-slate-50 flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-200">
            <div class="flex flex-col items-center mb-8">
                <div class="bg-indigo-600 p-4 rounded-full mb-4 shadow-lg text-white text-2xl">
                    <i class="fas fa-comments"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Welcome to Chat</h1>
                <p class="text-slate-500 text-center mt-2">Enter a display name to start chatting with others online.</p>
            </div>
            
            <form id="join-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Display Name</label>
                    <div class="relative text-slate-400">
                        <i class="fas fa-user absolute left-3 top-3.5"></i>
                        <input
                            type="text"
                            id="username-input"
                            placeholder="e.g. Octocat"
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-slate-800"
                            maxlength="20"
                            required
                        />
                    </div>
                </div>
                <button
                    type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl shadow-md transition-all active:scale-95"
                >
                    Start Chatting
                </button>
            </form>
            <div class="mt-6 pt-6 border-t border-slate-100 text-center text-xs text-slate-400 uppercase tracking-widest">
                Real-time Data Sync Enabled
            </div>
        </div>
    </div>

    <!-- MAIN CHAT INTERFACE (Hidden initially) -->
    <div id="chat-app" class="hidden flex flex-col h-screen max-w-4xl mx-auto w-full shadow-2xl overflow-hidden bg-slate-100">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600">
                    <i class="fas fa-hashtag"></i>
                </div>
                <div>
                    <h2 class="font-bold text-slate-800 leading-tight">General Channel</h2>
                    <div class="flex items-center gap-1.5">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-xs text-slate-500 font-medium">Live</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex flex-col items-end">
                    <span id="display-name-header" class="text-sm font-semibold text-slate-700">User</span>
                    <span id="user-id-header" class="text-[10px] text-slate-400 font-mono">ID: ...</span>
                </div>
                <button id="logout-btn" class="p-2 hover:bg-slate-100 rounded-full text-slate-500 transition-colors">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <!-- Messages Area -->
        <main id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-white/50 scrollbar-thin">
            <!-- Messages injected here -->
            <div id="empty-state" class="flex flex-col items-center justify-center h-full text-slate-400 space-y-2">
                <i class="far fa-smile text-5xl opacity-20"></i>
                <p>No messages yet. Be the first to say hello!</p>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="p-4 bg-white border-t border-slate-200 shrink-0">
            <form id="chat-form" class="flex gap-2 max-w-full">
                <input
                    type="text"
                    id="message-input"
                    placeholder="Type your message..."
                    class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-slate-800"
                    autocomplete="off"
                />
                <button
                    type="submit"
                    id="send-btn"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-xl transition-all shadow-md active:scale-95 flex items-center justify-center"
                >
                    <i class="fas fa-paper-plane px-1"></i>
                </button>
            </form>
            <p id="footer-status" class="text-[10px] text-slate-400 mt-2 text-center"></p>
        </footer>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global environment variables
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'github-chat-demo';

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // State
        let currentUser = null;
        let displayName = localStorage.getItem('chat_username') || '';

        // DOM Elements
        const joinScreen = document.getElementById('join-screen');
        const chatApp = document.getElementById('chat-app');
        const joinForm = document.getElementById('join-form');
        const chatForm = document.getElementById('chat-form');
        const usernameInput = document.getElementById('username-input');
        const messageInput = document.getElementById('message-input');
        const messagesContainer = document.getElementById('messages-container');
        const emptyState = document.getElementById('empty-state');
        const displayNameHeader = document.getElementById('display-name-header');
        const userIdHeader = document.getElementById('user-id-header');
        const footerStatus = document.getElementById('footer-status');
        const logoutBtn = document.getElementById('logout-btn');

        // Auth initialization
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth failed:", err);
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user && displayName) {
                showChat();
            }
        });

        // Toggle UI
        function showChat() {
            joinScreen.classList.add('hidden');
            chatApp.classList.remove('hidden');
            displayNameHeader.textContent = displayName;
            userIdHeader.textContent = `ID: ${currentUser.uid.slice(0, 8)}...`;
            footerStatus.textContent = `Connected as ${displayName} • UID: ${currentUser.uid}`;
            startListening();
        }

        function showJoin() {
            joinScreen.classList.remove('hidden');
            chatApp.classList.add('hidden');
        }

        // Firestore Listening
        let unsubscribe = null;
        function startListening() {
            if (unsubscribe) unsubscribe();
            
            const messagesRef = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
            const q = query(messagesRef);

            unsubscribe = onSnapshot(q, (snapshot) => {
                const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // Client side sort (Rule 2)
                const sorted = docs.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                renderMessages(sorted.slice(-50));
            }, (error) => {
                console.error("Firestore listen error:", error);
            });
        }

        function renderMessages(messages) {
            if (messages.length > 0) {
                emptyState.classList.add('hidden');
            } else {
                emptyState.classList.remove('hidden');
            }

            messagesContainer.innerHTML = '';
            if (messages.length === 0) messagesContainer.appendChild(emptyState);

            messages.forEach(msg => {
                const isMe = msg.userId === currentUser.uid;
                const div = document.createElement('div');
                div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
                
                const timeStr = msg.createdAt ? new Date(msg.createdAt.seconds * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '...';
                
                div.innerHTML = `
                    ${!isMe ? `<span class="text-xs font-bold text-slate-500 ml-1 mb-1">${msg.sender}</span>` : ''}
                    <div class="max-w-[80%] px-4 py-2.5 rounded-2xl shadow-sm ${isMe ? 'msg-me' : 'msg-them'}">
                        <p class="text-sm leading-relaxed break-words">${escapeHTML(msg.text)}</p>
                    </div>
                    <span class="text-[10px] text-slate-400 mt-1 mx-1">${timeStr}</span>
                `;
                messagesContainer.appendChild(div);
            });
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function escapeHTML(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }

        // Event Handlers
        joinForm.onsubmit = (e) => {
            e.preventDefault();
            const name = usernameInput.value.trim();
            if (name) {
                displayName = name;
                localStorage.setItem('chat_username', name);
                if (currentUser) showChat();
            }
        };

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !currentUser) return;

            messageInput.value = '';
            
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                    text,
                    sender: displayName,
                    userId: currentUser.uid,
                    createdAt: serverTimestamp()
                });
            } catch (err) {
                console.error("Send failed:", err);
            }
        };

        logoutBtn.onclick = () => {
            localStorage.removeItem('chat_username');
            displayName = '';
            showJoin();
        };

        // Start app
        initAuth();
        if (displayName) {
            usernameInput.value = displayName;
        }
    </script>
</body>
</html>
